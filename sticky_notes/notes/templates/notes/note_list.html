{% extends 'base.html' %}
{% block title %}
  Sticky Notes - {{ page_title }}
{% endblock %}
{% block content %}
  <h2>{{ page_title }}</h2>
  <a href="{% url 'note_create' %}">Add note</a>
  <ul>
    {% for note in notes %}
      <li class="sticky-note-block">
        <a href="{% url 'note_detail' pk=note.pk %}">{{ note.title }}</a>
        <p>{{ note.content }}</p>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
